apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-app-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: node-app
  template:
    metadata:
      labels:
        app: node-app
    spec:
      containers:
      - name: node-app
        image: jashwanthk8/node-app:IMAGE_TAG
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3001
        env:
        - name: APP_VERSION
          value: "IMAGE_TAG"
